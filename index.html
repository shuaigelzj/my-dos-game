<!doctype html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <style>
        html, body { width: 100%; height: 100%; margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #jsdos { width: 100%; height: 100%; }
        #ui-layer { position: absolute; top: 10px; left: 10px; z-index: 100; display: flex; gap: 10px; }
        .btn { background: rgba(50, 50, 50, 0.8); color: white; border: 1px solid #777; padding: 5px 12px; cursor: pointer; font-size: 13px; border-radius: 4px; }
        .btn:hover { background: #555; }
        #overlay { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
    </style>
    <!-- js-dos style sheet -->
    <link rel="stylesheet" href="https://v8.js-dos.com/latest/js-dos.css">
    <!-- js-dos -->
    <script src="https://v8.js-dos.com/latest/js-dos.js"></script>
</head>
<body>

    <!-- 操作按钮 -->
    <div id="ui-layer" style="display: none;">
        <button class="btn" id="saveBtn">💾 导出存档并备份</button>
        <span id="status" style="font-size: 12px; align-self: center; color: #aaa;">进度自动保存中...</span>
    </div>

    <!-- 初始引导 -->
    <div id="overlay">
        <h2>DOS 游戏实验室</h2>
        <p>第一步：选择游戏 ROM (.zip)</p>
        <input type="file" id="romInput" accept=".zip">
    </div>

    <div id="jsdos"></div>

    <script>
        const romInput = document.getElementById('romInput');
        const saveBtn = document.getElementById('saveBtn');
        const uiLayer = document.getElementById('ui-layer');
        const overlay = document.getElementById('overlay');
        let ciInstance = null; // 存储运行实例

        romInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            overlay.style.display = 'none';
            uiLayer.style.display = 'flex';

            // 启动模拟器
            // 注意：js-dos v7 默认会尝试使用 IndexedDB 自动持久化
            ciInstance = await emulators.launch(URL.createObjectURL(file), "jsdos");
        });

        // 导出存档逻辑
        saveBtn.addEventListener('click', async () => {
            if (!ciInstance) return;
            
            // persist() 会提取当前虚拟盘中所有改变的文件（即存档）
            const changes = await ciInstance.persist();
            
            // 将二进制数据转为可下载文件
            const blob = new Blob([changes], { type: "application/octet-stream" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "dos_game_save_" + new Date().getTime() + ".jsdos";
            a.click();
            
            document.getElementById('status').innerText = "导出成功！";
            setTimeout(() => { document.getElementById('status').innerText = "进度自动保存中..."; }, 3000);
        });
    </script>
</body>
</html>
