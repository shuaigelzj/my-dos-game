<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>我的私有 DOS 游戏站</title>
    <!-- 引入 js-dos v7 标准资源 -->
    <link rel="stylesheet" href="./js-dos.css"></link>
    <script src="./js-dos.js"></script>
    <style>
        html, body { width: 100%; height: 100%; margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #jsdos { width: 100vw; height: 100vh; }
        
        /* UI 按钮层 */
        #ui-layer { 
            position: absolute; top: 15px; left: 15px; z-index: 100; 
            display: none; gap: 10px; align-items: center;
        }
        .btn { 
            background: rgba(40, 44, 52, 0.9); color: #61dafb; border: 1px solid #61dafb; 
            padding: 8px 15px; cursor: pointer; font-size: 14px; border-radius: 6px; font-weight: bold;
        }
        .btn:hover { background: #61dafb; color: #000; }

        /* 初始导入界面 */
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #1a1a1a; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 1000; 
        }
        .upload-box { border: 2px dashed #444; padding: 40px; border-radius: 12px; text-align: center; }
        input[type="file"] { margin-top: 20px; color: #888; }
    </style>
</head>
<body>

    <!-- 顶部操作栏 -->
    <div id="ui-layer">
        <button class="btn" id="saveBtn">💾</button>
    </div>

    <!-- 初始文件选择 -->
    <div id="overlay">
        <div class="upload-box">
            <h1>DOS 游戏站</h1>
            <p>请选择你的游戏 ROM (.zip 格式)</p>
            <input type="file" id="romInput" accept=".zip">
            <p style="font-size: 12px; color: #666; margin-top: 20px;">注：文件仅在本地运行，不会上传到服务器</p>
        </div>
    </div>

    <!-- 游戏渲染区域 -->
    <div id="jsdos"></div>

    <script>
        const romInput = document.getElementById('romInput');
        const saveBtn = document.getElementById('saveBtn');
        const uiLayer = document.getElementById('ui-layer');
        const overlay = document.getElementById('overlay');
        const jsdosContainer = document.getElementById('jsdos');
        
        let ciInstance = null; // 运行实例句柄

        // 监听文件选择
        romInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // 隐藏引导层，显示操作栏
            overlay.style.display = 'none';
            uiLayer.style.display = 'flex';

            try {
                // 1. 初始化 Dos 实例 (v7 API)
                // Dos 是 js-dos.js 暴露的全局函数
                const instance = await Dos(jsdosContainer);

                // 2. 准备游戏文件 URL
                const gameUrl = URL.createObjectURL(file);

                // 3. 运行游戏
                // v7 的运行逻辑是 instance.run(url)
                ciInstance = await instance.run(gameUrl);
                
                console.log("JSDOS 启动成功");
            } catch (err) {
                console.error("启动失败:", err);
                alert("启动失败！请确保选择的是标准的 DOS 游戏 ZIP 包。");
                //location.reload(); // 失败则重置
            }
        });

        // 存档导出功能
        saveBtn.addEventListener('click', async () => {
            if (!ciInstance) return;

            try {
                // persist() 会提取虚拟磁盘中所有被修改的文件（即存档）
                const changes = await ciInstance.persist();
                
                const blob = new Blob([changes], { type: "application/octet-stream" });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement("a");
                a.href = url;
                a.download = `DOS_Save_${new Date().getTime()}.jsdos`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                const status = document.getElementById('status');
                status.innerText = "导出成功！下次换电脑可将此文件拖入窗口恢复。";
                setTimeout(() => { status.innerText = "进度已启用浏览器自动保存"; }, 5000);
            } catch (err) {
                console.error("导出失败:", err);
                alert("导出存档失败。");
            }
        });
    </script>
</body>
</html>
